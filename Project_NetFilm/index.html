<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetFilm - Twoja baza filmów</title>
    <meta name="description" content="Strona z filmami">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1><span>N</span>et<span class="F">F</span>ilm</h1>
    </header>

    <main>
        <section class="contener1" aria-label="Filtry filmów">
            <div class="filter-group">
                <label for="selectCategory">Kategoria</label>
                <select id="selectCategory">
                    <option value="all">Wszystkie</option>
                    <option value="Akcja">Akcja</option> 
                    <option value="Dokumentalny">Dokumentalny</option>
                    <option value="Dramat">Dramat</option>
                    <option value="Horror">Horror</option>
                    <option value="Komedia">Komedia</option>
                    <option value="Kryminał">Kryminał</option>
                    <option value="Romans">Romans</option>
                    <option value="Sitcom">Sitcom</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Wojenny">Wojenny</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="rangeDuration">Długość</label>
                <input type="range" id="rangeDuration" min="0" max="300" step="1" value="0" oninput="formatujCzas(this)">
                <output id="wynik" for="rangeDuration">0h 00min</output>
            </div>

            <div class="filter-group">
                <label for="selectType">Format</label>
                <select id="selectType">
                    <option value="all">Wszystkie</option>
                    <option value="Film">Film</option>
                    <option value="Serial">Serial</option>
                </select>
            </div>

            <button type="button" class="btn-netflix">Zatwierdź filtry</button>
        </section>

        <section class="contener2" aria-label="Galeria filmów">
            <article class="film">
                <img src="imagines/gladiator.jpg" alt="Gladiator">
            </article>
            <article class="film">
                <img src="imagines/Memento.jpg" alt="Memento">
            </article>
            <article class="film">
                <img src="imagines/Requiem_dla_snu.jpg" alt="Requiem dla snu">
            </article>
            <article class="film">
                <img src="imagines/czekoladka.webp" alt="Czekoladka">
            </article>
            <article class="film">
                <img src="imagines/patriota.avif" alt="Patriota">
            </article>
            <article class="film">
                <img src="imagines/ogniem_i_mieczem.jpg" alt="Ogniem i mieczem">
            </article>
            <article class="film">
                <img src="imagines/M_jak_milosc.jpg" alt="M jak milosc">
            </article>
            <article class="film">
                <img src="imagines/Girls.webp" alt="Gilmore girls"> </article>
            <article class="film">
                <img src="imagines/kawaleria_powietrzna.jpg" alt="Kawaleria powietrzna">
            </article>
            <article class="film">
                <img src="imagines/Friends.webp" alt="Friends">
            </article>
            <article class="film">
                <img src="imagines/Agent.jpg" alt="Agent">
            </article>
            <article class="film">
                <img src="imagines/dr_House.jpg" alt="Dr House">
            </article>
        </section>
    </main>

    <script type="module" src="netflix.js"></script>
</body>
</html>
