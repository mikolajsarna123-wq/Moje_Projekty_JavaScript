<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do-List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone"id="view">
        <section  id="home-view">
          <div class="top-home">
            <h2>Home</h2>
            <i id="first-arrow" class="fa-regular fa-circle-right"></i>
          </div>
        </section>  
        <section id="add-task">
          <div class="top-add">
            <i id="secend-arrow"class="fa-regular fa-circle-left"></i>
            <h2>Add-Task</h2>
            <i id="third-arrow"class="fa-regular fa-circle-right"></i>
          </div>
          <input type="text" id="input">
          <ul class="container">
          </ul>
        </section>  
        <section id="deleted">
          <div class="top-delete">
            <i id="forth-arrow"class="fa-regular fa-circle-left"></i>
            <h2 >Deleted</h2>
          </div>
        </section>
      </div>
    </div>
      <script src="phone.js"></script>   
</body>
</html>
